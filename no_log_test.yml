---
- name: No log test
  hosts: all
  gather_facts: false
  no_log: true

  tasks:
    - name: Gather minimal network facts
      setup:
        gather_subset:
          - network
        filter:
          - ansible_en6

    - name: Show selected facts
      debug:
        msg:
          ansible_en6: "{{ ansible_en6 }}"
          ansible_en6.ipv4: "{{ ansible_en6.ipv4 }}"
          ansible_en6.ipv4[0].address: "{{ ansible_en6.ipv4[0].address }}"
