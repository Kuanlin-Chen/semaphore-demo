- name: Simple Semaphore Demo
  hosts: local
  gather_facts: true
  vars_files:
    - secrets.yml

  tasks:
    - name: Show Ansible runtime context
      debug:
        msg:
          inventory: "{{ ansible_inventory_sources }}"
          limit: "{{ ansible_limit | default('none') }}"
          tags: "{{ ansible_run_tags }}"
          skip_tags: "{{ ansible_skip_tags }}"
      tags: context

    - name: Create demo directory
      file:
        path: /tmp/semaphore-demo
        state: directory
      register: dir_result
      tags: demo

    - name: Report directory creation (human-readable)
      debug:
        msg: >
          Directory /tmp/semaphore-demo was {{ 'created' if dir_result.changed
          else 'already present' }}. Result: changed={{ dir_result.changed }}
      tags: msg

    - name: Create demo file
      copy:
        dest: /tmp/semaphore-demo/hello.txt
        content: |
          Hello from Ansible!
          Managed by Semaphore.
      register: file_result
      tags: demo

    - name: Report file creation (human-readable)
      debug:
        msg: >
          File {{ file_result.dest }} was {{ 'created' if file_result.changed
          else 'updated/unchanged' }}. Result: changed={{ file_result.changed }}
      tags: msg

    - name: Collect simplified status facts
      set_fact:
        demo_status:
          dir:
            path: /tmp/semaphore-demo
            changed: "{{ dir_result.changed | default(false) }}"
          file:
            path: "{{ file_result.dest | default('/tmp/semaphore-demo/hello.txt') }}"
            changed: "{{ file_result.changed | default(false) }}"
          message: "Demo completed successfully!"
          timestamp: "{{ ansible_date_time.iso8601 }}"
      tags: demo

    - name: Write status JSON to disk
      copy:
        dest: /tmp/semaphore-demo/status.json
        content: "{{ demo_status | to_nice_json }}"
      register: status_write
      tags: msg

    - name: Show final summary
      debug:
        msg: >
          {{ demo_status.message }} Directory changed={{ demo_status.dir.changed
          }}, file changed={{ demo_status.file.changed }} Status JSON written:
          {{ status_write.dest if status_write is defined else
          '/tmp/semaphore-demo/status.json' }}
      tags: msg

    - block:
      - name: Post request test
        uri:
          url: http://localhost:3000/api/project/1/tasks
          method: POST
          headers:
            Content-Type: application/json
            Authorization: "Bearer {{ api_token }}"
          body: |
            {
              "template_id": 9
            }
          status_code:
            - 200
            - 201
        register: post_result

      - name: Show POST request result
        debug:
          msg: >
            POST request to create task from template 9 returned status {{
            post_result.status }}. Response: {{ post_result.json }}
      
      tags: block-test

      rescue:
      - name: Handle POST request failure
        debug:
          msg: >
            Failed to create task from template 9. Error: {{
            post_result.msg if post_result is defined else 'Unknown error' }}

    - block:
      - name: GET status test
        uri:
          url: http://localhost:3000/api/project/1/tasks/16
          method: GET
          headers:
            Content-Type: application/json
            Authorization: "Bearer {{ api_token }}"
          status_code: 200
        register: get_result

      - name: Show Get request result
        debug:
          msg: >
            GET request for task 16 returned status {{ get_result.status }}.
            Response: {{ get_result.json }}
      
      tags: get-test

      rescue:
      - name: Handle GET request failure
        debug:
          msg: >
            Failed to retrieve task 16. Error: {{
            get_result.msg if get_result is defined else 'Unknown error' }}